<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MediaVault</title>

  <!-- Telegram Web App SDK -->

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts: Syne (display) + Literata (body) -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Literata:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── App Shell ── -->

  <div id="app">

```
<!-- Header -->
<header class="app-header">
  <div class="header-brand">
    <span class="brand-icon">◈</span>
    <span class="brand-name">MediaVault</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input
      id="searchInput"
      type="text"
      class="search-input"
      placeholder="Search titles…"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>✕</button>
  </div>
</header>

<!-- Filter chips -->
<div class="chip-bar">
  <button class="chip active" data-genre="all">All</button>
  <button class="chip" data-genre="action">Action</button>
  <button class="chip" data-genre="drama">Drama</button>
  <button class="chip" data-genre="comedy">Comedy</button>
  <button class="chip" data-genre="sci-fi">Sci-Fi</button>
</div>

<!-- State: Loading -->
<div id="stateLoading" class="state-view" hidden>
  <div class="spinner"></div>
  <p>Fetching content…</p>
</div>

<!-- State: Empty -->
<div id="stateEmpty" class="state-view" hidden>
  <span class="state-icon">⊘</span>
  <p>Nothing found for your query.</p>
</div>

<!-- State: Error -->
<div id="stateError" class="state-view" hidden>
  <span class="state-icon">⚠</span>
  <p id="stateErrorMsg">Something went wrong.</p>
  <button class="btn-retry" id="btnRetry">Try again</button>
</div>

<!-- Media Grid -->
<main id="mediaGrid" class="media-grid" role="list"></main>
```

  </div><!-- /#app -->

  <!-- ── Modal ── -->

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">

```
  <button class="modal-close" id="modalClose" aria-label="Close">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <div class="modal-hero">
    <img id="modalPoster" src="" alt="" class="modal-poster" />
    <div class="modal-hero-overlay">
      <div class="modal-meta">
        <span id="modalGenre" class="badge"></span>
        <span id="modalYear" class="badge badge--muted"></span>
      </div>
      <h2 id="modalTitle" class="modal-title"></h2>
      <div class="modal-rating">
        <span class="star">★</span>
        <span id="modalRating"></span>
      </div>
    </div>
  </div>

  <div class="modal-body">
    <p id="modalOverview" class="modal-overview"></p>

    <div class="player-wrap">
      <div class="player-placeholder" id="playerPlaceholder">
        <span>▶</span> Tap to load player
      </div>
      <iframe
        id="player"
        class="player-frame"
        src=""
        allow="autoplay; fullscreen"
        allowfullscreen
        hidden
      ></iframe>
    </div>
  </div>

</div>
```

  </div><!-- /#modal -->

  <script src="script.js"></script>

</body>
</html>
